# Mesaar Logistics Operations API — continuous integration.
#
# Runs on every push and pull request: installs the pinned dependencies, checks
# formatting/lint, runs an advisory type check, and executes the test suite.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-and-test:
    name: Lint, type-check & test
    runs-on: ubuntu-latest

    # A real PostgreSQL and Redis available for tests that need them.
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: mesaar
          POSTGRES_PASSWORD: mesaar
          POSTGRES_DB: mesaar
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U mesaar -d mesaar"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+psycopg2://mesaar:mesaar@localhost:5432/mesaar
      SECRET_KEY: ci-test-secret-not-for-production
      REDIS_URL: redis://localhost:6379/0
      CELERY_BROKER_URL: redis://localhost:6379/1
      CELERY_RESULT_BACKEND: redis://localhost:6379/2
      ENVIRONMENT: test
      LOG_JSON: "false"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff==0.5.5 black==24.4.2 mypy==1.10.1

      - name: Ruff (lint)
        run: ruff check app

      - name: Black (format check)
        run: black --check -l 100 app

      - name: Mypy (type check, advisory)
        # Type checking is informative but must not block the pipeline yet.
        continue-on-error: true
        run: mypy app

      - name: Pytest
        run: pytest -q
