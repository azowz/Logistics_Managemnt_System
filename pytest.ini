[pytest]
# Put the repository root on sys.path so `import app` resolves during collection
# under bare `pytest` (CI runs `pytest -q`). Without this, only `python -m pytest`
# works, because that form adds the CWD to sys.path while the bare console script
# does not. `pythonpath` (pytest >= 7) fixes it regardless of how pytest is invoked.
pythonpath = .
testpaths = tests
addopts = -q
filterwarnings =
    ignore::DeprecationWarning
