# Alembic configuration for the Mesaar logistics backend.
# Run from the repo root so `import app...` resolves.
[alembic]
script_location = migrations
prepend_sys_path = .
# Database URL is injected at runtime from app settings (see migrations/env.py);
# this is only a fallback for tooling that reads the ini directly.
sqlalchemy.url = postgresql+psycopg2://postgres:postgres@localhost:5432/logistics

[post_write_hooks]
# Keep generated migrations formatted.
hooks = black
black.type = console_scripts
black.entrypoint = black
black.options = -l 100

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
